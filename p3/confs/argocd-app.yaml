apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: playground
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Maamichaima/test_argocd.git
    targetRevision: main
    path: p3/confs

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true